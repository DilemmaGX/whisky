github:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

automation:
  - changed-files:
      - any-glob-to-any-file:
          - "whisky/**"
          - "templates/**"
          - "roles/**"

wiki-content:
  - changed-files:
      - any-glob-to-any-file:
          - "wiki/**"

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "**/*.md"

workflows:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
