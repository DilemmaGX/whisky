name: Bug Report
description: Report a bug in CLI, pipeline, or automation workflows.
title: "Bug: "
labels:
  - bug
  - needs-triage
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Pipeline exits before creating wiki file
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - cli
        - pipeline
        - github-actions
        - templates
        - docs
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
