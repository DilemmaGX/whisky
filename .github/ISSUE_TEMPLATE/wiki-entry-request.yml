name: Wiki Entry Request
description: Request a new or updated wiki article for automated draft generation.
title: "Wiki entry request: "
labels:
  - wiki-entry
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Submit a complete request for automated wiki generation.
  - type: input
    id: topic
    attributes:
      label: Primary topic
      description: Main wiki topic title. For multiple entries, use the structured task block below.
      placeholder: Open Source
    validations:
      required: true
  - type: dropdown
    id: operation
    attributes:
      label: Operation
      description: Choose how content should be handled.
      options:
        - create
        - update
        - remake
    validations:
      required: true
  - type: dropdown
    id: entry_type
    attributes:
      label: Entry type
      description: Choose auto to let planner classify each task.
      options:
        - auto
        - concept
        - technology
        - biography
        - general
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and required sections
      description: List must-have sections, boundaries, or exclusions.
      placeholder: Include history, licenses, governance models, and practical adoption patterns.
    validations:
      required: true
  - type: textarea
    id: source_hints
    attributes:
      label: Source hints
      description: Add links or source categories to improve accuracy.
      placeholder: Official docs, standards bodies, foundation reports, peer-reviewed papers.
    validations:
      required: false
  - type: textarea
    id: structured_tasks
    attributes:
      label: Structured multi-entry tasks (JSON, optional)
      description: Use this for one issue that manages multiple entries.
      value: |
        {
          "global_objective": "Create and update wiki entries",
          "tasks": [
            {
              "topic": "Open Source",
              "operation": "create",
              "entry_type": "auto",
              "scope": "Definition, history, licenses, and governance.",
              "source_hints": ["OSI", "Linux Foundation"],
              "related_entries": ["Software Licensing"],
              "research_tasks": [
                {
                  "query": "Open Source Definition",
                  "purpose": "Primary source definition",
                  "source_hints": ["official standards body"]
                }
              ]
            },
            {
              "topic": "Software Licensing",
              "operation": "update",
              "entry_type": "auto",
              "scope": "Refresh with modern compliance and tooling.",
              "source_hints": ["SPDX", "official docs"],
              "related_entries": ["Open Source"],
              "research_tasks": []
            }
          ]
        }
    validations:
      required: false
  - type: textarea
    id: reference_policy
    attributes:
      label: Reference policy
      description: Define allowed domains, forbidden source types, and evidence quality constraints.
      placeholder: Prefer official docs and standards bodies. Exclude AI-generated mirror sites.
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I confirm this is a wiki content request.
          required: true
        - label: I understand output is a draft and requires human review before merge.
          required: true
