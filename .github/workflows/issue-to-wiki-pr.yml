name: Issue to Wiki PR

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  generate-wiki-pr:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.state == 'open' &&
        (
          contains(join(github.event.issue.labels.*.name, ','), 'wiki-entry') ||
          contains(github.event.issue.title, 'Wiki') ||
          contains(github.event.issue.title, 'wiki')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse issue event
        id: parse_issue
        run: python -m whisky.cli issue-event --event-path "${GITHUB_EVENT_PATH}" --github-output

      - name: Generate wiki draft with multi-agent pipeline
        id: pipeline
        if: steps.parse_issue.outputs.should_process == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m whisky.cli run --repo-root . --event-path "${GITHUB_EVENT_PATH}" --github-output

      - name: Stop when not a wiki request
        if: steps.parse_issue.outputs.should_process != 'true' || steps.pipeline.outputs.should_generate != 'true'
        run: |
          echo "No wiki generation needed."
          echo "${{ steps.pipeline.outputs.summary }}"

      - name: Create Pull Request
        if: steps.pipeline.outputs.should_generate == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "wiki: auto-generate entry for issue #${{ steps.pipeline.outputs.issue_number }}"
          title: "wiki: ${{ steps.pipeline.outputs.topic }} (from issue #${{ steps.pipeline.outputs.issue_number }})"
          body: |
            Auto-generated by whisky multi-agent pipeline.
            - Issue: #${{ steps.pipeline.outputs.issue_number }}
            - Topic: ${{ steps.pipeline.outputs.topic }}
            - File: ${{ steps.pipeline.outputs.file_path }}
            - Summary: ${{ steps.pipeline.outputs.summary }}
            Please review factual accuracy before merge.
          branch: "auto/wiki-${{ steps.pipeline.outputs.issue_number }}"
          delete-branch: true
