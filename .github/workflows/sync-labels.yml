name: Sync Labels

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/labels.json"

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync repository labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs")
            const config = JSON.parse(fs.readFileSync(".github/labels.json", "utf8"))
            const owner = context.repo.owner
            const repo = context.repo.repo

            const existing = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100
            })
            const existingMap = new Map(existing.map((label) => [label.name, label]))

            for (const item of config) {
              if (existingMap.has(item.name)) {
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: item.name,
                  new_name: item.name,
                  color: item.color,
                  description: item.description
                })
              } else {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: item.name,
                  color: item.color,
                  description: item.description
                })
              }
            }
